<!DOCTYPE html>
<html class="has-navbar-fixed-top has-background-black">
    {% include header.html %}
    <body>
        {% include navbar.html %}
        <section class="hero is-link has-text-centered front-hero">
            <div class="hero-body">
                <div class="block">
                    <img style="image-rendering: -webkit-optimize-contrast;" src="/img/logo.png">
                </div>
                <div class="block">
                    <img style="image-rendering: -webkit-optimize-contrast;" src="/img/tagline.png">
                </div>
                <div class="buttons is-justify-content-center">
                    <a href="/schedule" class="button is-danger is-large is-responsive">
                        <span class="has-text-weight-bold">Schedule</span>
                    </a>
                    <a href="https://www.axs.com/search?q=evo" class="button is-primary is-large is-responsive">
                        <span class="icon">
                            <i class="fa fa-link"></i>
                        </span>
                        <span class="has-text-weight-bold">Evo Passes</span>
                    </a>
                    <a href="/volunteer" class="button is-primary is-large is-responsive">
                        <span class="icon">
                            <i class="fa fa-clipboard"></i>
                        </span>
                        <span class="has-text-weight-bold">Volunteer</span>
                    </a>
                </div>
            </div>
        </section>
        <section class="section has-background-black">
            <div class="container is-max-desktop">
                <div class="content has-text-white has-text-centered">
                    <h1 class="is-size-2 bomber">{{ page.title }}</h1>
                    {{ content }}
                    <a href="{{site.twitch}}">
                        <span class="icon is-large">
                            <i class="fab fa-2x fa-twitch"></i>
                        </span>
                    </a>
                    <a href="https://twitter.com/{{site.twitter.username}}">
                        <span class="icon is-large">
                            <i class="fab fa-2x fa-twitter"></i>
                        </span>
                    </a>
                    <a href="{{site.youtube}}">
                        <span class="icon is-large">
                            <i class="fab fa-2x fa-youtube"></i>
                        </span>
                    </a>
                </div>
            </div>
        </section>
        <section class="section has-background-black-bis">
            <div class="container-fluid">
                <div class="content has-text-white has-text-centered">
                    <h1 class="is-size-2 bomber">Discover Vortex Gallery</h1>
                    <h2 class="bomber">Vortex Gallery Tournaments</h2>
                    <hr>
                    {% include games_buttons.html %}
                    <hr>
                </div>
            </div>
        </section>
    </body>
    {% include footer.html %}
</html>
